---
name: Security and SBOM
on:
  workflow_call:
    secrets:
      app-id:
        required: true
      private-key:
        required: true
      github-token:
        required: true

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.ref }}-sec
  cancel-in-progress: true

jobs:
  sbom:
    name: Scan
    runs-on: gha-small
    outputs:
      message: ${{ steps.scan-message.outputs.message }}
      body: ${{ steps.scan-message.outputs.body }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate SBOM with Syft and submit to Dependency Graph
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: github-json
          dependency-snapshot: true
          artifact-name: syft-sbom-report
          upload-artifact-retention: 90
          github-token: ${{ secrets.github-token }}

      - name: Run Grype vulnerability scanner
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: .
          output-format: table
          output-file: vuln.output
          severity-cutoff: high
          only-fixed: true
          fail-build: true

      - name: Get scan output
        id: scan-output
        if: always()
        run: |
          {
            echo 'TEST_OUTPUT<<EOF'
            awk 1 ORS='\n' < vuln.output
            echo EOF
          } > "$GITHUB_OUTPUT"

      - name: Generate scan message
        id: scan-message
        if: always()
        env:
          RESULT: ${{ steps.scan-output.outputs.TEST_OUTPUT }}
        run: |
          if ${{ contains(steps.scan.outcome, 'success') }}; then
                    echo "message=:tada: No vulnerabilities found!" >>"$GITHUB_OUTPUT"
                    echo "body=No vulnerabilities found!" >>"$GITHUB_OUTPUT"
          else
                    echo "message=:warning: Vulnerabilites found!" >>"$GITHUB_OUTPUT"
                    {
                      echo 'body<<EOF'
                      echo "$RESULT"
                      echo 'EOF'
                    } >> "$GITHUB_OUTPUT"
          fi

  deployment_bot_comment:
    name: Deployment Bot Comment
    if: github.event_name == 'pull_request'
    needs: [sbom]
    uses: ./.github/workflows/create-update-deployment-bot-comment.yml
    with:
      repository: agent
      pr_number: ${{ github.event.pull_request.number }}
      ref_name: ${{ github.ref_name }}
      comment_key: sec-
      comment_body: |
        # :lock: Vulnerability Scan Summary

        ${{ needs.sbom.outputs.message }}

        See [Handling Vulnerabilities](https://github.com/resim-ai/rerun/blob/main/docs/handling-vulnerabilities.md) for instructions on what to do with this information.

        <details><summary>Show Details</summary>

        \`\`\`\n
        ${{ needs.sbom.outputs.body }}
        \`\`\`

        </details>

    secrets:
      DEPLOYMENT_BOT_APP_ID: ${{ secrets.app-id }}
      DEPLOYMENT_BOT_PRIVATE_KEY: ${{ secrets.private-key }}

